<style>
  .palette { max-width: 960px; margin: 0 auto; font-family: inherit; }

  /* Tabs */
  .palette-tab-input { display: none; }
  .palette-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--ct-border, #ddd); margin-bottom: 1.5rem; overflow-x: auto; }
  .palette-tabs label { padding: 10px 18px; font-size: .85rem; font-weight: 600; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .2s, border-color .2s; }
  .palette-tabs label:hover { color: #555; }
  .palette-panel { display: none; }

  #palette-tab-colors:checked ~ .palette-tabs label[for="palette-tab-colors"],
  #palette-tab-tokens:checked ~ .palette-tabs label[for="palette-tab-tokens"],
  #palette-tab-buttons:checked ~ .palette-tabs label[for="palette-tab-buttons"],
  #palette-tab-structures:checked ~ .palette-tabs label[for="palette-tab-structures"] {
    color: var(--ct-primary, #0374B5); border-bottom-color: var(--ct-primary, #0374B5);
  }
  #palette-tab-colors:checked ~ .palette-panels #panel-colors,
  #palette-tab-tokens:checked ~ .palette-panels #panel-tokens,
  #palette-tab-buttons:checked ~ .palette-panels #panel-buttons,
  #palette-tab-structures:checked ~ .palette-panels #panel-structures { display: block; }

  .palette h2 { font-size: 1.15rem; margin: 1.5rem 0 .75rem; color: #333; }
  .palette-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .palette-swatch { border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
  .palette-swatch-color { height: 56px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: .85rem; }
  .palette-swatch-info { padding: 8px; font-size: .75rem; background: #fafafa; }
  .palette-swatch-info .swatch-name { font-weight: 600; color: #333; }
  .palette-swatch-info .swatch-var { font-family: monospace; font-size: .65rem; color: #888; display: block; margin-top: 2px; }
  .palette-swatch-info .swatch-contrast { font-size: .7rem; margin-top: 6px; padding: 3px 8px; border-radius: 4px; display: inline-block; font-weight: 600; }
  .swatch-contrast { font-size: .7rem; padding: 3px 8px; border-radius: 4px; display: inline-block; font-weight: 600; }
  .swatch-contrast.pass { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
  .swatch-contrast.fail { background: #FFEBEE; color: #C62828; border: 1px solid #EF9A9A; }

  .palette-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
  .palette-btn-demo { padding: 10px 20px; border-radius: 8px; font-size: .85rem; font-weight: 600; border: none; cursor: default; text-align: center; }
  .palette-btn-demo small { display: block; font-weight: 400; font-size: .7rem; margin-top: 4px; opacity: .7; }

  .palette-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
  @media (max-width: 640px) { .palette-compare { grid-template-columns: 1fr; } }
  .palette-preview { padding: 20px; border-radius: 12px; border: 1px solid #e0e0e0; }
  .palette-mode-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
</style>

<div class="palette">

  <input type="radio" name="palette-tab" id="palette-tab-colors" class="palette-tab-input" checked>
  <input type="radio" name="palette-tab" id="palette-tab-tokens" class="palette-tab-input">
  <input type="radio" name="palette-tab" id="palette-tab-buttons" class="palette-tab-input">
  <input type="radio" name="palette-tab" id="palette-tab-structures" class="palette-tab-input">

  <nav class="palette-tabs">
    <label for="palette-tab-colors">Colores</label>
    <label for="palette-tab-tokens">Tokens</label>
    <label for="palette-tab-buttons">Botones</label>
    <label for="palette-tab-structures">Estructuras</label>
  </nav>

  <div class="palette-panels">
    <div class="palette-panel" id="panel-colors"></div>
    <div class="palette-panel" id="panel-tokens"></div>
    <div class="palette-panel" id="panel-buttons"></div>
    <div class="palette-panel" id="panel-structures"></div>
  </div>
</div>
